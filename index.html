<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Jelly Belly Mini Gamek</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>🍬 Jelly Belly API Mini Gamek</h1>
    <section id="random-game">
        <h2>🎲 Véletlen íz</h2>
        <button id="randomBtn">Mutass egy véletlen ízt!</button>
        <div id="randomResult"></div>
    </section>

   <section id="daily-game">
        <h2>📅 Napi Jelly Belly</h2>
        <input type="date" id="datePicker">
        <button id="dailyBtn">Mutasd a napi ízt!</button>
        <div id="dailyResult"></div>
    </section>

    <section id="lucky-game">
        <h2>🍀 Szerencse Jelly Belly</h2>
        <button id="luckyBtn">Kattints a szerencsédre!</button>
        <div id="luckyResult"></div>
    </section>

    <script src="index.js"></script>
</body>
</html>
